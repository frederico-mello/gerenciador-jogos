{% extends "base.html" %}
{% block title %}Meu Perfil — Gerenciador{% endblock %}
{% block content %}
  <h1>Meu Perfil</h1>
  <form method="post" action="{{ url_for('games.perfil') }}" class="game-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <div class="field">
      <label for="nome">Nome</label>
      <input id="nome" name="nome" type="text" value="{{ form.nome or '' }}" required />
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input id="email" name="email" type="email" value="{{ form.email or '' }}" required />
    </div>
    <div class="field">
      <label for="senha">Nova senha (deixe em branco para manter)</label>
      <input id="senha" name="senha" type="password" />
    </div>
    <div class="field">
      <label for="telefone_ddd">Telefone</label>
      <div style="display:flex; gap:0.5rem;">
        <input id="telefone_ddd" type="text" name="telefone_ddd" placeholder="DDD" maxlength="2" pattern="\d{2}" value="{{ form.telefone_ddd or '' }}" style="width:5ch;" />
        <input id="telefone_numero" type="text" name="telefone_numero" placeholder="Número" maxlength="9" pattern="\d{8,9}" value="{{ form.telefone_numero or '' }}" style="flex:1;" />
      </div>
    </div>
    <div class="field">
      <label>
        <input type="checkbox" name="whatsapp" value="1" {% if form.whatsapp %}checked{% endif %} />
        Este número é WhatsApp
      </label>
    </div>
    <div class="field">
      <label>
        <input type="checkbox" name="consentimento" value="1" {% if form.consentimento %}checked{% endif %} />
        Autorizo o tratamento dos meus dados pessoais conforme a LGPD.
      </label>
    </div>
    <div class="field">
      <label>
        <input type="checkbox" name="receber_emails" value="1" {% if form.receber_emails %}checked{% endif %} />
        Receber notificações por email
      </label>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Salvar</button>
      <a class="btn btn-ghost" href="{{ url_for('games.index') }}">Cancelar</a>
    </div>
  </form>
{% endblock %}
