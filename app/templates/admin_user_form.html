{% extends "base.html" %}
{% block title %}Editar Usuário — {{ super() }}{% endblock %}
{% block content %}
<h1>Editar usuário: {{ user.nome }}</h1>

<form method="post" action="{{ url_for('games.admin_users_editar', user_id=user.id) }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
  <div class="form-group">
    <label for="nome">Nome *</label>
    <input type="text" id="nome" name="nome" value="{{ form.get('nome', user.nome) }}" required />
  </div>
  <div class="form-group">
    <label for="email">Email</label>
    <input type="email" id="email" name="email" value="{{ form.get('email', user.email) }}" />
  </div>
  <div class="form-group">
    <label for="escola_id">Escola</label>
    <select id="escola_id" name="escola_id">
      <option value="">— Sem escola —</option>
      {% for s in escolas %}
        <option value="{{ s.id }}" {% if (form.get('escola_id') or user.escola_id)|string == s.id|string %}selected{% endif %}>{{ s.nome }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="form-group">
    <label for="senha">Nova senha (deixe em branco para manter)</label>
    <input type="password" id="senha" name="senha" />
  </div>
  <div class="form-group">
    <label for="telefone_ddd">Telefone</label>
    <div style="display:flex; gap:0.5rem;">
      <input id="telefone_ddd" type="text" name="telefone_ddd" placeholder="DDD" maxlength="2" pattern="\d{2}" value="{{ form.get('telefone_ddd', '') }}" style="width:5ch;" />
      <input id="telefone_numero" type="text" name="telefone_numero" placeholder="Número" maxlength="9" pattern="\d{8,9}" value="{{ form.get('telefone_numero', '') }}" aria-label="Número do telefone" title="Número do telefone" style="flex:1;" />
    </div>
  </div>
  <div class="form-group">
    <label>
      <input type="checkbox" name="whatsapp" value="1" {% if form.get('whatsapp', '1' if user.whatsapp else '') == '1' or (not form and user.whatsapp) %}checked{% endif %} />
      Este número é WhatsApp
    </label>
  </div>
  <div class="form-group">
    <label>
      <input type="checkbox" name="consentimento" value="1" {% if form.get('consentimento', '1' if user.consentimento else '') == '1' or (not form and user.consentimento) %}checked{% endif %} />
      Consentimento LGPD
    </label>
  </div>
  <div class="form-group">
    <label>
      <input type="checkbox" name="ativo" value="1" {% if form.get('ativo', '1' if user.ativo else '') == '1' or (not form and user.ativo) %}checked{% endif %} />
      Ativo
    </label>
  </div>
  <div class="form-group">
    <label>
      <input type="checkbox" name="receber_emails" value="1" {% if form.get('receber_emails', '1' if user.receber_emails else '') == '1' or (not form and user.receber_emails) %}checked{% endif %} />
      Receber notificações por email
    </label>
  </div>
  <div class="form-actions">
    <button class="btn btn-primary" type="submit">Salvar</button>
    <a class="btn" href="{{ url_for('games.admin_users') }}">Cancelar</a>
  </div>
</form>
{% endblock %}
