{% if pagination and pagination.pages > 1 %}
  <div class="pagination">
    {% if pagination.has_prev %}
      <a href="?{% for k, v in request.args.items() if k != 'page' %}{{ k }}={{ v }}&{% endfor %}page={{ pagination.prev_num }}">‹ Anterior</a>
    {% endif %}
    {% for p in range(1, pagination.pages + 1) %}
      {% if p == pagination.page %}
        <strong>{{ p }}</strong>
      {% else %}
        <a href="?{% for k, v in request.args.items() if k != 'page' %}{{ k }}={{ v }}&{% endfor %}page={{ p }}">{{ p }}</a>
      {% endif %}
    {% endfor %}
    {% if pagination.has_next %}
      <a href="?{% for k, v in request.args.items() if k != 'page' %}{{ k }}={{ v }}&{% endfor %}page={{ pagination.next_num }}">Próximo ›</a>
    {% endif %}
  </div>
{% endif %}
