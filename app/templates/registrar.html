{% extends "base.html" %}
{% block title %}Registrar — {{ super() }}{% endblock %}
{% block content %}
<h1>Criar conta</h1>

<form method="post" action="{{ url_for('games.registrar') }}">
  <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
  <div class="form-group">
    <label for="nome">Nome *</label>
    <input type="text" id="nome" name="nome" value="{{ form.get('nome', '') }}" required />
  </div>
  <div class="form-group">
    <label for="email">Email *</label>
    <input type="email" id="email" name="email" value="{{ form.get('email', '') }}" required />
  </div>
  <div class="form-group">
    <label for="senha">Senha *</label>
    <input type="password" id="senha" name="senha" required minlength="4" />
  </div>
  <div class="form-group">
    <label for="confirmacao">Confirmar senha *</label>
    <input type="password" id="confirmacao" name="confirmacao" required />
  </div>
  <div class="form-group">
    <label for="escola_id">Escola *</label>
    <select id="escola_id" name="escola_id" required>
      <option value="">— Selecione —</option>
      {% for s in schools %}
        <option value="{{ s.id }}" {% if form.get('escola_id')|string == s.id|string %}selected{% endif %}>{{ s.nome }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="form-actions">
    <button class="btn btn-primary" type="submit">Criar conta</button>
    <a class="btn" href="{{ url_for('games.login') }}">Já tenho conta</a>
  </div>
</form>
{% endblock %}
