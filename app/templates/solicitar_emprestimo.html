{% extends "base.html" %}

{% block title %}Solicitar Empréstimo — {{ game.nome }}{% endblock %}

{% block content %}
  <h1>Solicitar Empréstimo</h1>

  <div class="detail-meta" style="margin-bottom: 1rem;">
    <strong>{{ game.nome }}</strong>
    <span class="badge badge-{{ game.area }}">{{ game.area }}</span>
    {% include "_badge_disponibilidade.html" %}
  </div>

  <section class="loan-terms" style="margin-bottom: 1.5rem;">
    <h2>Termos de Empréstimo</h2>
    <div class="markdown-content" style="max-height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 1rem; background: #fafafa;">
      {{ termos_html|safe }}
    </div>
  </section>

  <form method="post" action="{{ url_for('games.solicitar_emprestimo', game_id=game.id) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

    <div class="form-group">
      <label for="devolucao_prevista">Data de devolução prevista</label>
      <input type="date" id="devolucao_prevista" name="devolucao_prevista" value="{{ devolucao_prevista_default }}" required />
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" name="aceite_termos" value="1" required />
        Li e aceito os termos de empréstimo
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Confirmar solicitação</button>
      <a class="btn btn-secondary" href="{{ url_for('games.detalhe', game_id=game.id) }}">Cancelar</a>
    </div>
  </form>
{% endblock %}
