{% extends "base.html" %}
{% block title %}Entrar na fila — Gerenciador{% endblock %}
{% block content %}
  <h1>Jogo indisponível</h1>
  <p>O jogo <strong>{{ game.nome }}</strong> está emprestado no momento.</p>
  <p>Atualmente há <strong>{{ queue_count }}</strong> pessoa(s) na fila de reserva.</p>
  <form method="post" action="{{ url_for('games.entrar_fila', game_id=game.id) }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
    <button type="submit" class="btn btn-primary">Entrar na fila de reserva</button>
    <a class="btn btn-secondary" href="{{ url_for('games.index') }}">Voltar ao catálogo</a>
  </form>
{% endblock %}
