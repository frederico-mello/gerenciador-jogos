{% extends "base.html" %}
{% block title %}{% if slot %}Editar{% else %}Novo{% endif %} Horario — {{ super() }}{% endblock %}
{% block content %}
<h1>{% if slot %}Editar horario{% else %}Novo horario{% endif %}</h1>

<form method="post" action="{% if slot %}{{ url_for('games.admin_pickup_slots_editar', slot_id=slot.id) }}{% else %}{{ url_for('games.admin_pickup_slots_criar') }}{% endif %}">
  <div class="form-group">
    <label for="dia_semana">Dia da semana *</label>
    <select id="dia_semana" name="dia_semana" required>
      <option value="">—</option>
      {% set dias_opts = [(0, 'Segunda-feira'), (1, 'Terca-feira'), (2, 'Quarta-feira'), (3, 'Quinta-feira'), (4, 'Sexta-feira'), (5, 'Sabado'), (6, 'Domingo')] %}
      {% for val, nome in dias_opts %}
      <option value="{{ val }}" {% if ((form.dia_semana|string) == (val|string)) or (slot and slot.dia_semana == val) %}selected{% endif %}>{{ nome }}</option>
      {% endfor %}
    </select>
  </div>

  <div class="form-group">
    <label for="hora">Hora *</label>
    <input type="time" id="hora" name="hora" value="{{ (form.hora or (slot.hora if slot else '')) or '' }}" required />
  </div>

  <div class="form-actions">
    <button class="btn btn-primary" type="submit">Salvar</button>
    <a class="btn" href="{{ url_for('games.admin_pickup_slots') }}">Cancelar</a>
  </div>
</form>
{% endblock %}
